name: CI automa

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  verify-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr create --base main --head ${{ github.ref_name }} \
            --title "Auto-merge: ${{ github.ref_name }}" \
            --body "Automated PR by CI" || echo "PR already exists"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium

      - name: Create secrets.json
        working-directory: ${{ github.workspace }}
        env:
          BGG_USER: ${{ secrets.BGG_USER }}
          BGG_PASS: ${{ secrets.BGG_PASS }}
        run: |
          if [ -z "$BGG_USER" ] || [ -z "$BGG_PASS" ]; then
            echo "WARNING: BGG_USER o BGG_PASS no configurados. El proxy no podrá autenticarse con BGG."
            echo "Configúralos en GitHub Settings > Secrets > Actions"
          fi
          cat > secrets.json <<EOF
          {"user":"$BGG_USER","password":"$BGG_PASS"}
          EOF

      - name: Build & Start Docker
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8082 > /dev/null 2>&1; then
              echo "Servicios listos."
              exit 0
            fi
            echo "Intento $i/30..."
            sleep 3
          done
          echo "ERROR: Servicios no disponibles tras 90s"
          docker compose logs
          exit 1
      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ github.ref_name }}-${{ github.run_id }}
          path: |
            evidence/screenshots/
            evidence/reports/
            evidence/logs/
          if-no-files-found: warn
          retention-days: 30

      - name: Stop Docker
        if: always()
        run: docker compose down

      - name: Merge Pull Request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(gh pr list --base main --head ${{ github.ref_name }} \
            --json number --jq '.[0].number')
          [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ] || { echo "No PR"; exit 1; }
          gh pr merge $PR_NUMBER --squash
