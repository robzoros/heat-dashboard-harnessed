name: CI automa

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  create-pr-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          PR_URL=$(gh pr create --base main --head ${{ github.ref_name }} \
            --title "Auto-merge: ${{ github.ref_name }}" \
            --body "Automated PR to merge ${{ github.ref_name }} into main" \
            --json url --jq '.url')
          echo "Created PR: $PR_URL"
          sleep 2
          gh pr merge $PR_URL --squash
