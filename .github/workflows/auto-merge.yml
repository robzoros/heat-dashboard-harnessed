name: CI automa

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  create-pr-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base main --head ${{ github.ref_name }} \
            --title "Auto-merge: ${{ github.ref_name }}" \
            --body "Automated PR to merge ${{ github.ref_name }} into main"

      - name: Merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.ref_name }} --squash
