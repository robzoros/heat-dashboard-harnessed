version: '3.8'

networks:
  game-net:
    driver: bridge

services:
  game-dashboard:
    build: .
    ports:
      - "8082:80"
    depends_on:
      - bgg-proxy
    networks:
      - game-net

  bgg-proxy:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./proxy:/app
    command: sh -c "npm install && npx nodemon --watch server.js --watch classify.js --watch test-classify.js --ignore championships/ --ignore test-data/ --ignore node_modules/ --ext js,mjs,cjs server.js"
    networks:
      - game-net